<h2>Customer Leads</h2>

<button onclick="downloadCSV()">Download Leads</button>

<table>

<thead>
<tr>
<th>Name</th>
<th>Phone</th>
<th>Location</th>
<th>Date</th>
</tr>
</thead>

<tbody id="leadTable"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyDhUTnoCW3_L5HQSVlUO6cxwpoAfW70X9o",
authDomain: "balakrishna-realestate.firebaseapp.com",
projectId: "balakrishna-realestate",
storageBucket: "balakrishna-realestate.firebasestorage.app",
messagingSenderId: "126760489279",
appId: "1:126760489279:web:f9ba9cbb033edbfb67c38a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const table = document.getElementById("leadTable");

async function loadLeads(){

const querySnapshot = await getDocs(collection(db,"leads"));

querySnapshot.forEach((doc)=>{

const d = doc.data();

const row = `
<tr>
<td>${d.name}</td>
<td>${d.phone}</td>
<td>${d.location}</td>
<td>${new Date(d.time.seconds*1000).toLocaleString()}</td>
</tr>
`;

table.innerHTML += row;

});

}

loadLeads();

</script>

<script>

function downloadCSV(){

let rows=document.querySelectorAll("table tr");

let csv=[];

rows.forEach(row=>{

let cols=row.querySelectorAll("td,th");

let data=[];

cols.forEach(col=>data.push(col.innerText));

csv.push(data.join(","));

});

let blob=new Blob([csv.join("\n")],{type:"text/csv"});

let link=document.createElement("a");

link.href=URL.createObjectURL(blob);

link.download="leads.csv";

link.click();

}

</script>

</body>
